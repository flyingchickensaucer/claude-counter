display_information:
  name: claude-counter
  description: A public record of who says claude the most
  background_color: "#d97757"
features:
  bot_user:
    display_name: claude-counter
    always_online: true
  slash_commands:
    - command: /claude-counter-board
      description: Post the Vibe Coding Hall of Slop
      should_escape: false
    - command: /claude-counter-me
      description: Your own invocation count and rank, shown only to you
      should_escape: false
    - command: /claude-counter-sermon
      description: Receive a vibe coding proverb
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - app_mentions:read
      - channels:history
      - groups:history
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
